name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate manifest JSON
        run: python -m json.tool custom_components/salus/manifest.json

      - name: Install test requirements
        run: |
          python -m pip install --upgrade pip
          python - <<'PY' > /tmp/salus-requirements.txt
          import json
          import pathlib

          manifest = json.loads(
              pathlib.Path("custom_components/salus/manifest.json").read_text()
          )
          print("\n".join(manifest["requirements"]))
          PY
          python -m pip install -r /tmp/salus-requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -q

      - name: Compile custom component
        run: python -m compileall -q custom_components tests

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
